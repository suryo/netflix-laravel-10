<!doctype html>
<html lang="id" class="scroll-smooth">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Netflixku – Movies</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/style.css" />
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            netflix: {
                                red: "#E50914",
                                dark: "#141414",
                                darker: "#0a0a0a",
                                gray: "#1a1a1a",
                                light: "#e5e5e5",
                            },
                        },
                    },
                },
            };
        </script>
    </head>
    <body class="min-h-screen">
        <!-- NAVBAR -->
        <nav class="glass-nav" id="navbar">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center space-x-8">
                        <a
                            href="index.html"
                            class="text-red-600 font-black text-2xl tracking-wider"
                            >NETFLIXKU</a
                        >
                        <div class="hidden md:flex items-center space-x-6">
                            <a
                                href="index.html"
                                class="text-sm font-medium text-gray-300 hover:text-white"
                                >Home</a
                            >
                            <a
                                href="movies.html"
                                class="text-sm font-bold text-white"
                                >Movies</a
                            >
                            <a
                                href="tv-series.html"
                                class="text-sm font-medium text-gray-300 hover:text-white"
                                >Tv Series</a
                            >
                            <a
                                href="tv-online.html"
                                class="text-sm font-medium text-gray-300 hover:text-white"
                                >TV Online</a
                            >
                            <a
                                href="radio-online.html"
                                class="text-sm font-medium text-gray-300 hover:text-white"
                                >Radio Online</a
                            >
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <a
                            href="login.html"
                            class="text-sm text-white hover:text-red-500"
                            >Sign In</a
                        >
                        <a
                            href="register.html"
                            class="btn-netflix px-4 py-2 text-white text-xs font-bold rounded-md"
                            >Join Now</a
                        >
                    </div>
                </div>
            </div>
        </nav>

        <!-- CONTENT -->
        <main class="pt-28 pb-20 px-4 md:px-12">
            <!-- Page Header -->
            <div class="max-w-7xl mx-auto mb-12">
                <h1
                    class="text-4xl md:text-5xl font-black text-white uppercase italic tracking-tighter mb-3"
                >
                    Semua <span class="text-red-600">Film</span>
                </h1>
                <p class="text-gray-400 text-base">
                    Temukan film favorit dari berbagai genre pilihan.
                </p>
            </div>

            <!-- Filter Bar -->
            <div class="max-w-7xl mx-auto mb-10 flex flex-wrap gap-3">
                <button
                    class="px-5 py-2 bg-red-600 text-white text-xs font-black uppercase tracking-widest rounded-full"
                >
                    Semua
                </button>
                <button
                    class="px-5 py-2 bg-white/5 border border-white/10 text-gray-300 text-xs font-bold uppercase tracking-widest rounded-full hover:bg-white/10 transition"
                >
                    Action
                </button>
                <button
                    class="px-5 py-2 bg-white/5 border border-white/10 text-gray-300 text-xs font-bold uppercase tracking-widest rounded-full hover:bg-white/10 transition"
                >
                    Drama
                </button>
                <button
                    class="px-5 py-2 bg-white/5 border border-white/10 text-gray-300 text-xs font-bold uppercase tracking-widest rounded-full hover:bg-white/10 transition"
                >
                    Comedy
                </button>
                <button
                    class="px-5 py-2 bg-white/5 border border-white/10 text-gray-300 text-xs font-bold uppercase tracking-widest rounded-full hover:bg-white/10 transition"
                >
                    Horror
                </button>
                <button
                    class="px-5 py-2 bg-white/5 border border-white/10 text-gray-300 text-xs font-bold uppercase tracking-widest rounded-full hover:bg-white/10 transition"
                >
                    Animation
                </button>
                <button
                    class="px-5 py-2 bg-white/5 border border-white/10 text-gray-300 text-xs font-bold uppercase tracking-widest rounded-full hover:bg-white/10 transition"
                >
                    Romance
                </button>
            </div>

            <!-- Movie Grid -->
            <div
                class="max-w-7xl mx-auto grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-5"
            >
                <!-- Repeat movie cards -->
                <a href="movie-detail.html" class="movie-card relative group">
                    <img
                        src="https://placehold.co/300x450/1a1a1a/e50914?text=Movie+1"
                        alt="Movie 1"
                        class="w-full aspect-[2/3] object-cover rounded-lg"
                    />
                    <div
                        class="absolute inset-0 rounded-lg gradient-overlay opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-3"
                    >
                        <div>
                            <p
                                class="text-white text-xs font-black uppercase italic"
                            >
                                Action Movie
                            </p>
                            <span class="category-badge text-[9px]"
                                >Action</span
                            >
                        </div>
                    </div>
                </a>
                <a href="movie-detail.html" class="movie-card relative group">
                    <img
                        src="https://placehold.co/300x450/1a1a1a/0055ff?text=Movie+2"
                        alt="Movie 2"
                        class="w-full aspect-[2/3] object-cover rounded-lg"
                    />
                    <div
                        class="absolute inset-0 rounded-lg gradient-overlay opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-3"
                    >
                        <p
                            class="text-white text-xs font-black uppercase italic"
                        >
                            Drama Title
                        </p>
                    </div>
                </a>
                <a href="movie-detail.html" class="movie-card relative group">
                    <img
                        src="https://placehold.co/300x450/1a1a1a/ff6600?text=Movie+3"
                        alt="Movie 3"
                        class="w-full aspect-[2/3] object-cover rounded-lg"
                    />
                </a>
                <a href="movie-detail.html" class="movie-card relative group">
                    <img
                        src="https://placehold.co/300x450/1a1a1a/009900?text=Movie+4"
                        alt="Movie 4"
                        class="w-full aspect-[2/3] object-cover rounded-lg"
                    />
                </a>
                <a href="movie-detail.html" class="movie-card relative group">
                    <img
                        src="https://placehold.co/300x450/1a1a1a/cc0066?text=Movie+5"
                        alt="Movie 5"
                        class="w-full aspect-[2/3] object-cover rounded-lg"
                    />
                </a>
                <a href="movie-detail.html" class="movie-card relative group">
                    <img
                        src="https://placehold.co/300x450/1a1a1a/660099?text=Movie+6"
                        alt="Movie 6"
                        class="w-full aspect-[2/3] object-cover rounded-lg"
                    />
                </a>
                <a href="movie-detail.html" class="movie-card relative group">
                    <img
                        src="https://placehold.co/300x450/111111/e50914?text=Movie+7"
                        alt="Movie 7"
                        class="w-full aspect-[2/3] object-cover rounded-lg"
                    />
                </a>
                <a href="movie-detail.html" class="movie-card relative group">
                    <img
                        src="https://placehold.co/300x450/111111/0099cc?text=Movie+8"
                        alt="Movie 8"
                        class="w-full aspect-[2/3] object-cover rounded-lg"
                    />
                </a>
                <a href="movie-detail.html" class="movie-card relative group">
                    <img
                        src="https://placehold.co/300x450/111111/cc6600?text=Movie+9"
                        alt="Movie 9"
                        class="w-full aspect-[2/3] object-cover rounded-lg"
                    />
                </a>
                <a href="movie-detail.html" class="movie-card relative group">
                    <img
                        src="https://placehold.co/300x450/111111/006633?text=Movie+10"
                        alt="Movie 10"
                        class="w-full aspect-[2/3] object-cover rounded-lg"
                    />
                </a>
                <a href="movie-detail.html" class="movie-card relative group">
                    <img
                        src="https://placehold.co/300x450/111111/993300?text=Movie+11"
                        alt="Movie 11"
                        class="w-full aspect-[2/3] object-cover rounded-lg"
                    />
                </a>
                <a href="movie-detail.html" class="movie-card relative group">
                    <img
                        src="https://placehold.co/300x450/111111/330066?text=Movie+12"
                        alt="Movie 12"
                        class="w-full aspect-[2/3] object-cover rounded-lg"
                    />
                </a>
            </div>

            <!-- Pagination -->
            <div class="max-w-7xl mx-auto mt-12 flex justify-center gap-2">
                <button
                    class="w-10 h-10 rounded-full bg-red-600 text-white text-sm font-bold"
                >
                    1
                </button>
                <button
                    class="w-10 h-10 rounded-full bg-white/5 border border-white/10 text-gray-300 text-sm hover:bg-white/10 transition"
                >
                    2
                </button>
                <button
                    class="w-10 h-10 rounded-full bg-white/5 border border-white/10 text-gray-300 text-sm hover:bg-white/10 transition"
                >
                    3
                </button>
                <span
                    class="w-10 h-10 flex items-center justify-center text-gray-500"
                    >…</span
                >
                <button
                    class="w-10 h-10 rounded-full bg-white/5 border border-white/10 text-gray-300 text-sm hover:bg-white/10 transition"
                >
                    10
                </button>
            </div>
        </main>

        <script src="js/main.js"></script>
    </body>
</html>
