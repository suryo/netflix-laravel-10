<!doctype html>
<html lang="id" class="scroll-smooth">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Netflixku – Register</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/style.css" />
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            netflix: {
                                red: "#E50914",
                                dark: "#141414",
                                darker: "#0a0a0a",
                                gray: "#1a1a1a",
                                light: "#e5e5e5",
                            },
                        },
                    },
                },
            };
        </script>
    </head>
    <body
        class="min-h-screen flex items-center justify-center py-16 relative overflow-hidden"
    >
        <div
            class="absolute inset-0 bg-gradient-to-br from-red-950/20 via-black to-black"
        ></div>
        <div
            class="absolute -top-1/4 -right-1/4 w-1/2 h-1/2 bg-red-900/15 rounded-full blur-[150px] pointer-events-none"
        ></div>

        <div class="relative z-10 w-full max-w-md mx-auto px-4">
            <div class="text-center mb-10">
                <a
                    href="index.html"
                    class="text-red-600 font-black text-4xl tracking-wider text-glow"
                    >NETFLIXKU</a
                >
            </div>

            <div class="glass-card p-8 md:p-10 rounded-3xl">
                <h1
                    class="text-3xl font-black text-white uppercase italic tracking-tighter mb-2"
                >
                    Daftar
                </h1>
                <p class="text-gray-500 text-sm mb-8">
                    Buat akun baru dan mulai nikmati hiburan tanpa batas.
                </p>

                <form action="#" method="POST" class="space-y-5">
                    <div>
                        <label
                            class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2"
                            >Nama Lengkap</label
                        >
                        <input
                            type="text"
                            placeholder="John Doe"
                            class="w-full search-input py-3.5 px-5 rounded-xl text-white placeholder-gray-600 text-sm"
                        />
                    </div>
                    <div>
                        <label
                            class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2"
                            >Email</label
                        >
                        <input
                            type="email"
                            placeholder="email@example.com"
                            class="w-full search-input py-3.5 px-5 rounded-xl text-white placeholder-gray-600 text-sm"
                        />
                    </div>
                    <div>
                        <label
                            class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2"
                            >Password</label
                        >
                        <input
                            type="password"
                            placeholder="Min. 8 karakter"
                            class="w-full search-input py-3.5 px-5 rounded-xl text-white placeholder-gray-600 text-sm"
                        />
                    </div>
                    <div>
                        <label
                            class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2"
                            >Konfirmasi Password</label
                        >
                        <input
                            type="password"
                            placeholder="Ulangi password"
                            class="w-full search-input py-3.5 px-5 rounded-xl text-white placeholder-gray-600 text-sm"
                        />
                    </div>
                    <div>
                        <label
                            class="flex items-start gap-3 cursor-pointer group"
                        >
                            <input
                                type="checkbox"
                                class="w-4 h-4 rounded mt-0.5 border border-white/20 bg-white/5 accent-red-600 cursor-pointer"
                            />
                            <span
                                class="text-gray-400 text-sm group-hover:text-white transition leading-relaxed"
                                >Saya menyetujui
                                <a
                                    href="#"
                                    class="text-red-500 hover:text-red-400 font-bold"
                                    >Syarat & Ketentuan</a
                                >
                                yang berlaku</span
                            >
                        </label>
                    </div>
                    <button
                        type="submit"
                        class="w-full btn-netflix py-3.5 rounded-xl text-sm font-black uppercase tracking-widest"
                    >
                        Buat Akun
                    </button>
                </form>

                <div class="flex items-center gap-3 my-6">
                    <div class="flex-1 h-px bg-white/10"></div>
                    <span class="text-gray-500 text-xs">ATAU</span>
                    <div class="flex-1 h-px bg-white/10"></div>
                </div>

                <p class="text-center text-gray-400 text-sm">
                    Sudah punya akun?
                    <a
                        href="login.html"
                        class="text-red-500 hover:text-red-400 font-bold transition"
                        >Masuk</a
                    >
                </p>
            </div>
        </div>
    </body>
</html>
